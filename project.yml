name: DriveCatalog
options:
  bundleIdPrefix: com.drivecatalog
  deploymentTarget:
    macOS: "14.0"

settings:
  SWIFT_VERSION: "5.9"
  CODE_SIGN_STYLE: Automatic
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""

targets:
  DriveCatalog:
    type: application
    platform: macOS
    sources:
      - DriveCatalog
    info:
      path: DriveCatalog/Info.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.drivecatalog.app
      INFOPLIST_FILE: DriveCatalog/Info.plist
      PRODUCT_NAME: DriveCatalog
      GENERATE_INFOPLIST_FILE: false
    preBuildScripts:
      - script: |
          PLIST="${SRCROOT}/DriveCatalog/Info.plist"
          GIT_HASH=$(cd "${SRCROOT}" && git rev-parse --short=7 HEAD 2>/dev/null || echo "dev")
          BUILD_DATE=$(date +"%Y-%m-%d")

          # Version: read from updates/latest.json, append -dev for debug builds
          MANIFEST="${SRCROOT}/updates/latest.json"
          if [ -f "$MANIFEST" ]; then
            BASE_VERSION=$(python3 -c "import json; print(json.load(open('${MANIFEST}'))['version'])" 2>/dev/null || echo "0.0")
            BASE_BUILD=$(python3 -c "import json; print(json.load(open('${MANIFEST}'))['build'])" 2>/dev/null || echo "0")
          else
            BASE_VERSION="0.0"
            BASE_BUILD="0"
          fi

          # Only stamp version in Debug builds. Release builds are stamped by
          # build-release.sh BEFORE xcodebuild runs — the pre-build script must
          # NOT overwrite those values (latest.json still has the previous release).
          COMMITS_SINCE=$(cd "${SRCROOT}" && git rev-list --count HEAD 2>/dev/null || echo "0")
          if [ "${CONFIGURATION}" = "Debug" ]; then
            VERSION="${BASE_VERSION}-dev"
            BUILD_NUM="${COMMITS_SINCE}"
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" "$PLIST"
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${BUILD_NUM}" "$PLIST"
          fi
          /usr/libexec/PlistBuddy -c "Add :GitCommitHash string ${GIT_HASH}" "$PLIST" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Set :GitCommitHash ${GIT_HASH}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :BuildDate string ${BUILD_DATE}" "$PLIST" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Set :BuildDate ${BUILD_DATE}" "$PLIST"
        name: Stamp Build Info
    postBuildScripts:
      - script: |
          bash "${SRCROOT}/scripts/embed-python.sh"
        name: Embed Python Runtime
      - script: |
          bash "${SRCROOT}/scripts/embed-secrets.sh"
        name: Embed Secrets

  DriveCatalogUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - DriveCatalogUITests
    dependencies:
      - target: DriveCatalog
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.drivecatalog.uitests
      GENERATE_INFOPLIST_FILE: true
